<html>
    <head>
        <title>Assignment 3 - Web-Based VR</title>
        <meta charset="utf-8">
        <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <script src="https://d3js.org/d3.v3.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    </head>

    <body style='margin: 0px; overflow: hidden;'>
    <video class="input_video" style="display: none;"></video>
    <canvas class="output_canvas" width="1280" height="720" style="display:none;"></canvas>
    <a-scene>
        <a-entity id ="anchor" position="0 0 -2" rotation="0 0 0">
          <a-entity id="chart" rotation="0 0 0" position="-0.01 -0.0 -0.0" scale="0.05 0.15 0.05"></a-entity>
        </a-entity>
    <a-entity camera look-controls="enabled: false"></a-entity>
    </a-scene>
    <script src="main.js"></script>
</html>
